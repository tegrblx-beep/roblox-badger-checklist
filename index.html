<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badger Checklist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>
</head>
<body>

<div class="wrap">

  <!-- ===================== HOME VIEW ===================== -->
  <div id="homeView">
    <header>
      <h1>Badger Checklist</h1>
      <p class="sub">Search for a badger and jump straight into its checklist.</p>
    </header>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="homeSearch" placeholder="Search for a badger" autocomplete="off" />
      <button type="button" class="search-clear" id="searchClearBtn" aria-label="Clear search">✕</button>
    </div>
    <div id="badgerList"></div>
    <div class="empty" id="homeEmpty" style="display:none;">No badger matches that search.</div>
  </div>

  <!-- ===================== DETAIL VIEW ===================== -->
  <div id="detailView">
    <button class="back-btn" id="backBtn">← All badgers</button>
    <header class="detail-header">
      <h2 class="badger-name" id="detailName"></h2>
      <div class="difficulty-label" id="detailDifficulty"></div>
      <div class="game-link-line" id="detailGameLink"></div>
      <div class="stat-line">
        <span class="stat-count" id="statCount">0 / 0</span>
        <span class="stat-pct" id="statPct">0%</span>
        <span class="stat-label">collected</span>
      </div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="milestones" id="milestones"></div>
      <div class="list-status-row">
        <div id="listStatus" class="list-status"></div>
        <button type="button" class="bulk-btn" id="refreshBtn" style="display:none;">🔄 Refresh from sheet</button>
      </div>
    </header>

    <div class="controls-row">
      <input type="text" id="badgeSearch" placeholder="Filter by badge or game name" />
      <label><input type="checkbox" id="hideDoneBox"> Hide collected</label>
      <button type="button" class="bulk-btn" id="checkAllBtn">Check all</button>
      <button type="button" class="bulk-btn" id="uncheckAllBtn">Uncheck all</button>
    </div>

    <div id="list"></div>
  </div>

</div>

<script>
// ==================================================================================
//  EDIT THIS SECTION IN VS CODE — this is your entire badger database.
//
//  Each badger looks like this:
//  {
//    id: "unique-id-no-spaces",       // used internally, keep it unique
//    name: "EToH Badger",             // shown as the big heading
//    difficulty: "Extreme",           // shown under the name, auto color-coded
//                                     // (easy/medium/hard/extreme keywords change the color)
//    gameLink: "https://www.roblox.com/games/...",
//    milestones: [                    // add as many as you want, or leave empty []
//      { name: "Halfway there", target: 8 },
//      { name: "Beat EToH Badger", target: 15 }
//    ],
//    sheetUrl: "https://docs.google.com/spreadsheets/d/.../edit?gid=123",
//                                     // OPTIONAL: checklist auto-loads from this sheet.
//                                     // The sheet needs a header row with these columns
//                                     // (any order, names are matched loosely):
//                                     //   badge name | game | link | image | description | type
//                                     //   namecolor | gamecolor | descriptioncolor | typecolor | bgcolor
//                                     // (the color columns are all optional too)
//                                     // Leave blank to use only the manual `badges` list.
//    badges: [                        // manual entries - always shown, ADDED ON TOP of
//                                     // anything loaded from sheetUrl. Use this for badges
//                                     // not in the sheet, or to override a sheet row (a
//                                     // manual entry with the same name+link replaces the
//                                     // sheet's version). Add/edit/remove entries here in
//                                     // VS Code - there are no edit buttons on the page.
//                                     //
//                                     // Every field except `link` is optional - you can leave
//                                     // them out entirely, not just blank. This is a complete,
//                                     // valid entry on its own:
//                                     //   { link: "https://www.roblox.com/badges/123456/Badge-Name" }
//                                     // name/game/image/description all auto-fill from Roblox
//                                     // once the page loads. Everything below just shows every
//                                     // field spelled out for reference:
//      {
//        name: "",                                                  // auto-filled if blank
//        game: "",                                                  // auto-filled if blank
//        link: "https://www.roblox.com/badges/123456/Badge-Name",
//        image: "",                                                 // auto-filled if blank
//        description: "",                                           // auto-filled if blank
//        type: "Easy",                                              // optional, hidden entirely if left out
//        nameColor: "",                                             // optional, any CSS color e.g. "#ff8800" or "gold"
//        gameColor: "",                                             // optional
//        descriptionColor: "",                                      // optional
//        typeColor: "",                                             // optional, overrides the auto easy/hard/etc color
//        bgColor: ""                                                // optional, colors the whole badge row's background
//      }
//    ]
//  }
// ==================================================================================

</script>
</body>
</html>
